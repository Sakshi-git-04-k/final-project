<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-app.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>My To-Do List</h1>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..."
                    class="todo-input"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button id="allBtn" class="filter-btn active">All</button>
                <button id="activeBtn" class="filter-btn">Active</button>
                <button id="completedBtn" class="filter-btn">Completed</button>
            </div>

            <div class="stats-section">
                <span id="stats">0 tasks remaining</span>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here dynamically -->
            </ul>

            <div id="emptyMessage" class="empty-message">
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="todo-app.js"></script>
</body>
</html>
